spring.application.name=WeLink
server.port=8080
spring.autoconfigure.exclude=org.redisson.spring.starter.RedissonAutoConfigurationV2

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/welink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=WeLinkHikariPool

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.epsilon.welink.*.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Redis Configuration
spring.data.redis.host=${WELINK_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${WELINK_REDIS_PORT:6379}
spring.data.redis.database=${WELINK_REDIS_DATABASE:0}
spring.data.redis.timeout=${WELINK_REDIS_TIMEOUT:5000}

# Redisson Configuration
# Redisson is currently unused in the codebase. Disable its auto configuration to
# avoid eager Redis connection checks blocking local startup on Windows + WSL.

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=latest

# MinIO Configuration
welink.minio.endpoint=http://localhost:9000
welink.minio.access-key=minioadmin
welink.minio.secret-key=minioadmin
welink.minio.bucket-name=welink

# JWT Configuration
welink.jwt.secret=WeLinkJwtSecretKey2026VeryLongSecretKeyForSecurity
welink.jwt.access-token-expiration=7200000
welink.jwt.refresh-token-expiration=604800000

# Instance ID for Distributed Deployment
welink.instance.id=instance-1

# WebSocket Configuration
welink.websocket.port=8081
welink.websocket.heartbeat-interval=30
welink.websocket.heartbeat-timeout=60
welink.im.send-rate-limit-per-second=30
welink.im.kafka-retry.max-retries=3

# Outbox Configuration
welink.outbox.publish-interval-ms=3000
welink.outbox.batch-size=100
welink.outbox.max-retries=6
welink.outbox.base-retry-delay-seconds=5

# Logging
logging.level.com.epsilon.welink=debug
logging.level.org.springframework=info
